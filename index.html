<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Generator 2026</title>
   
    <!-- Tailwind CSS (CDN para versión estática) -->
    <script src="https://cdn.tailwindcss.com"></script>
   
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
   
    <!-- Configuración de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans:['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        ::selection {
            background-color: rgba(16, 185, 129, 0.3);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }
       
        /* Utilidades para ocultar elementos */
        .hidden { display: none !important; }

        /* Placeholder más visible en dark mode — tarea 4 */
        ::placeholder {
            color: #a3a3a3 !important; /* neutral-400: suficientemente visible sin romper el contraste */
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased selection:bg-emerald-500/30">
    <!-- Header -->
    <header class="border-b border-neutral-800 bg-neutral-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-emerald-500 rounded flex items-center justify-center text-neutral-900 font-bold">
                    <i data-lucide="terminal" class="w-4 h-4"></i>
                </div>
                <h1 class="text-xl font-semibold tracking-tight">
                    Prompt Generator <span class="text-emerald-500">2026</span>
                </h1>
            </div>
            <div class="hidden sm:block text-[10px] font-mono text-neutral-500 uppercase tracking-widest">
                Versión Estática (Sin Node.js)
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 min-h-[calc(100vh-73px)]">
       
        <!-- Left Panel: Controls -->
        <div class="p-6 sm:p-8 border-r border-neutral-800 overflow-y-auto lg:max-h-[calc(100vh-73px)]">
            <div class="space-y-10">
               
                <!-- Section: Role -->
                <section>
                    <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                        <i data-lucide="cpu" class="w-3.5 h-3.5"></i> Rol del Modelo
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                       
                        <!-- Parent Category — TAREA 3: renombrado a "ROL" -->
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label class="block text-[11px] text-neutral-500 uppercase font-medium">Rol</label>
                                <div class="flex gap-1">
                                    <button id="btnDelParent" onclick="deleteParentCategory()" class="hidden p-1 text-neutral-200 hover:text-red-400 transition-colors" title="Eliminar categoría">
                                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                                    </button>
                                    <button onclick="toggleAddParent()" class="p-1 text-neutral-200 hover:text-emerald-400 transition-colors" title="Agregar categoría al sistema">
                                        <i id="iconAddParent" data-lucide="plus" class="w-6 h-6"></i>
                                    </button>
                                </div>
                            </div>
                           
                            <div id="parentInputContainer" class="hidden flex gap-2">
                                <input id="newParentLabel" onkeydown="if(event.key==='Enter') addParentCategory()" placeholder="Nuevo rol..." class="flex-1 bg-neutral-900 border border-emerald-500/30 rounded-lg px-3 py-2 text-sm focus:outline-none">
                                <button onclick="addParentCategory()" class="p-2 bg-emerald-500 text-neutral-950 rounded-lg hover:bg-emerald-400 transition-colors">
                                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                           
                            <input id="parentRole" list="parentRolesList" oninput="handleParentChange()" placeholder="Seleccionar o escribir un rol..." class="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all text-neutral-200">
                            <datalist id="parentRolesList"></datalist>
                        </div>

                        <!-- Child Speciality — TAREA 3: renombrado a "ESPECIALIDAD" -->
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label class="block text-[11px] text-neutral-500 uppercase font-medium">Especialidad</label>
                                <div class="flex gap-1">
                                    <button id="btnDelChild" onclick="deleteChildSpeciality()" class="hidden p-1 text-neutral-200 hover:text-red-400 transition-colors" title="Eliminar especialidad">
                                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                                    </button>
                                    <button id="btnAddChild" onclick="toggleAddChild()" class="p-1 text-neutral-200 hover:text-emerald-400 transition-colors opacity-30" disabled title="Agregar especialidad">
                                        <i id="iconAddChild" data-lucide="plus" class="w-6 h-6"></i>
                                    </button>
                                </div>
                            </div>
                            <div id="childInputContainer" class="hidden flex gap-2">
                                <input id="newChildLabel" onkeydown="if(event.key==='Enter') addChildSpeciality()" placeholder="Nueva especialidad..." class="flex-1 bg-neutral-900 border border-emerald-500/30 rounded-lg px-3 py-2 text-sm focus:outline-none">
                                <button onclick="addChildSpeciality()" class="p-2 bg-emerald-500 text-neutral-950 rounded-lg hover:bg-emerald-400 transition-colors">
                                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                           
                            <select id="childRole" onchange="handleChildChange()" disabled class="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all appearance-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                                <option value="">Seleccionar rol primero</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- Section: Tech Stack -->
                <section>
                    <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                        <i data-lucide="code-2" class="w-3.5 h-3.5"></i> Stack Tecnológico
                    </h2>
                    <div class="bg-neutral-900 border border-neutral-800 rounded-xl p-4 focus-within:ring-1 focus-within:ring-emerald-500/30 transition-all">
                        <div id="techStackContainer" class="flex flex-wrap gap-2 mb-3 empty:hidden"></div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="plus" class="w-3.5 h-3.5 text-neutral-600"></i>
                            <input id="tagInput" type="text" onkeydown="handleAddTag(event)" placeholder="Escribe una tecnología y pulsa Enter..." class="w-full bg-transparent text-sm focus:outline-none">
                        </div>
                    </div>
                </section>

                <!-- Section: Text Areas -->
                <section class="space-y-8">
                    <div>
                        <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                            <i data-lucide="terminal" class="w-3.5 h-3.5"></i> Objetivo de la Tarea
                        </h2>
                        <textarea id="objective" rows="3" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="¿Qué debe lograr la IA?"></textarea>
                    </div>
                    <div>
                        <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                            <i data-lucide="database" class="w-3.5 h-3.5"></i> Contexto Técnico
                        </h2>
                        <textarea id="techContext" rows="3" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="Detalles del entorno, versiones, arquitectura..."></textarea>
                    </div>
                    <div>
                        <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                            <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i> Restricciones y Reglas
                        </h2>
                        <textarea id="constraints" rows="3" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="Lo que NO debe hacer o reglas críticas..."></textarea>
                    </div>
                    <div>
                        <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                            <i data-lucide="code-2" class="w-3.5 h-3.5"></i> Datos de Entrada / Código
                        </h2>
                        <textarea id="inputData" rows="4" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="Pega aquí código, logs o datos brutos..."></textarea>
                    </div>
                    <div>
                        <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                            <i data-lucide="brain" class="w-3.5 h-3.5"></i> Cadena de Pensamiento
                        </h2>
                        <textarea id="chainOfThought" rows="3" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="Instrucciones paso a paso de cómo debe razonar el modelo (ej. Piensa paso a paso...)"></textarea>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                <i data-lucide="cloud" class="w-3.5 h-3.5"></i> Esquema de Salida
                            </h2>
                            <div class="flex gap-1">
                                <button id="btnDelSchema" onclick="deleteSchema()" class="hidden p-1 text-neutral-600 hover:text-red-400 transition-colors" title="Eliminar esquema">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                                </button>
                                <button onclick="toggleAddSchema()" class="p-1 text-neutral-600 hover:text-emerald-400 transition-colors" title="Agregar esquema">
                                    <i id="iconAddSchema" data-lucide="plus" class="w-3 h-3"></i>
                                </button>
                            </div>
                        </div>
                        <div id="schemaInputContainer" class="hidden flex gap-2 mb-2">
                            <input id="newSchemaLabel" onkeydown="if(event.key==='Enter') addSchema()" placeholder="Nuevo esquema..." class="flex-1 bg-neutral-900 border border-emerald-500/30 rounded-lg px-3 py-2 text-sm focus:outline-none">
                            <button onclick="addSchema()" class="p-2 bg-emerald-500 text-neutral-950 rounded-lg hover:bg-emerald-400 transition-colors">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        <select id="schemaSelect" onchange="handleSchemaChange()" class="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all appearance-none cursor-pointer mb-2"></select>
                        <textarea id="outputSchema" rows="2" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="Formato esperado (o selecciona uno arriba)..."></textarea>
                    </div>
                    <div>
                        <h2 class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                            <i data-lucide="book-open" class="w-3.5 h-3.5"></i> Ejemplos
                        </h2>
                        <textarea id="examples" rows="4" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/50 transition-all resize-none" placeholder="Proporciona ejemplos de entrada y salida esperada..."></textarea>
                    </div>
                </section>
            </div>
        </div>

        <!-- Right Panel: Preview -->
        <div class="bg-neutral-950/50 flex flex-col lg:max-h-[calc(100vh-73px)] border-t lg:border-t-0 border-neutral-800">
            <div class="px-6 py-3 border-b border-neutral-800 flex justify-between items-center bg-neutral-900/30">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-[10px] font-mono text-neutral-500 uppercase tracking-widest">PREVIEW_OUTPUT.xml</span>
                </div>
                <!-- TAREA 1: Botones de acción — LIMPIAR (rojo dark-mode) + COPIAR -->
                <div class="flex items-center gap-2">
                    <button id="clearBtn" onclick="handleClear()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all active:scale-95 bg-red-600 hover:bg-red-500 text-white">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> LIMPIAR PROMPT
                    </button>
                    <button id="copyBtn" onclick="handleCopy()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all active:scale-95 bg-emerald-500 hover:bg-emerald-600 text-neutral-950">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i> COPIAR PROMPT
                    </button>
                </div>
            </div>
            <div class="flex-1 p-6 overflow-y-auto bg-[#0a0a0a]">
                <pre id="preview" contenteditable="true" spellcheck="false" class="font-mono text-sm text-emerald-400/80 leading-relaxed whitespace-pre-wrap break-all focus:outline-none"></pre>
            </div>
        </div>
    </main>

    <!-- Lógica de la Aplicación -->
    <script>
        // ─────────────────────────────────────────────────────────────────────────
        // DATOS INICIALES  — TAREA 2: nuevos perfiles (regla 80/20, 20 años exp.)
        // ─────────────────────────────────────────────────────────────────────────
        const INITIAL_ROLES_DATA = {

            // ── DESARROLLO DE SOFTWARE ──────────────────────────────────────────
            dev: {
                label: "Desarrollo de Software",
                default: "Ingeniero de Software Senior con más de 20 años de experiencia",
                children: {
                    senior_dev: {
                        label: "Desarrollador de Software Senior (20+ años)",
                        prompt: "Desarrollador de Software Senior con más de 20 años de experiencia. Tu enfoque principal es la creación de arquitecturas de software escalables, mantenibles y seguras. Eres un purista de las buenas prácticas (SOLID, DRY, Clean Code, Patrones de Diseño) y dominas estrategias de testing y CI/CD. Al responder o generar código, no te limites a que 'funcione'; debes explicar por qué tomaste ciertas decisiones técnicas, evaluar los pros y contras de tu enfoque frente a otras alternativas, considerar el rendimiento (Big O) y entregar código robusto, comentado y listo para producción."
                    },
                    frontend: {
                        label: "Arquitecto Frontend Senior (React / Vue / Angular)",
                        prompt: "Arquitecto Frontend Senior con más de 20 años de experiencia construyendo aplicaciones web de alto rendimiento. Dominas React, Vue y Angular a nivel arquitectónico, incluyendo micro-frontends, SSR/SSG, lazy loading y optimización de Web Vitals (LCP, CLS, FID). Al diseñar una solución, justificas la elección del framework, defines el sistema de componentes, el manejo de estado (Redux, Zustand, Pinia) y la estrategia de testing (unit, integration, E2E con Cypress/Playwright). Tu código es accesible (WCAG 2.1) y adaptable (responsive-first)."
                    },
                    backend: {
                        label: "Ingeniero Backend Senior (Node / Go / Python / Java)",
                        prompt: "Ingeniero Backend Senior con más de 20 años de experiencia diseñando APIs RESTful y GraphQL robustas, microservicios y sistemas distribuidos. Dominas Node.js, Go, Python y Java. Cuando resuelves un problema, abordas el diseño de la base de datos, la autenticación (OAuth2, JWT), el manejo de errores, la observabilidad (logs estructurados, trazas, métricas) y los patrones de resiliencia (circuit breaker, retry, bulkhead). Prioriza siempre la seguridad (OWASP Top 10), la escalabilidad horizontal y la claridad del contrato de la API."
                    },
                    fullstack: {
                        label: "Desarrollador Fullstack Senior (20+ años)",
                        prompt: "Desarrollador Fullstack Senior con más de 20 años de experiencia dominando tanto el frontend como el backend de sistemas complejos. Tu visión end-to-end te permite tomar decisiones de arquitectura que optimizan el rendimiento y la experiencia de usuario de forma integral. Al abordar un problema, defines la arquitectura completa: desde el diseño de la base de datos y la API hasta el estado del cliente y la interfaz de usuario, justificando cada decisión técnica con sus trade-offs."
                    },
                    mobile: {
                        label: "Especialista en Desarrollo Mobile Senior (iOS/Android/Flutter)",
                        prompt: "Especialista en Desarrollo Mobile con más de 20 años de experiencia. Dominas el desarrollo nativo para iOS (Swift/SwiftUI) y Android (Kotlin/Jetpack Compose), así como el desarrollo cross-platform con Flutter y React Native. Al abordar un problema mobile, evalúas los trade-offs entre nativo vs. híbrido, optimizas el rendimiento (frames por segundo, consumo de batería y memoria), y garantizas una experiencia de usuario fluida siguiendo las guías de HIG (Apple) y Material Design (Google)."
                    },
                    ai_eng: {
                        label: "Ingeniero de IA y LLMs Senior",
                        prompt: "Ingeniero de IA y LLMs con más de 20 años de experiencia en el desarrollo de sistemas inteligentes, desde los primeros algoritmos de machine learning hasta las arquitecturas de Transformers modernas. Dominas el fine-tuning de modelos, la construcción de pipelines RAG (Retrieval-Augmented Generation), la orquestación con LangChain/LlamaIndex y el despliegue eficiente de modelos (quantización, vLLM, ONNX). Al diseñar un sistema de IA, evalúas siempre el costo de inferencia, la latencia, el riesgo de alucinaciones y las estrategias de evaluación (evals)."
                    },
                    platform_eng: {
                        label: "Ingeniero de Plataforma (Platform Engineering)",
                        prompt: "Ingeniero de Plataforma Senior con más de 20 años de experiencia construyendo Internal Developer Platforms (IDPs) que multiplican la productividad de los equipos de ingeniería. Tu dominio incluye Kubernetes, Helm, ArgoCD, Backstage y la construcción de golden paths que reducen la carga cognitiva de los desarrolladores. Al diseñar una plataforma, aplicas los principios de Team Topologies, defines SLOs de la plataforma y priorizas la experiencia del desarrollador (DevEx) como producto de primera clase."
                    },
                    blockchain: {
                        label: "Desarrollador Blockchain y Web3 Senior",
                        prompt: "Desarrollador Blockchain y Web3 con más de 20 años de experiencia en criptografía aplicada, redes distribuidas y desarrollo de smart contracts. Dominas Solidity (EVM), Rust (Solana/Near), auditoría de contratos y los patrones de seguridad más críticos (reentrancy, front-running, integer overflow). Al revisar o escribir código on-chain, priorizas la seguridad por encima de todo, calculas el costo en gas de cada operación y adviertes sobre los riesgos y las limitaciones del entorno trustless."
                    }
                }
            },

            // ── CIBERSEGURIDAD (NUEVO) ──────────────────────────────────────────
            cybersec: {
                label: "Ciberseguridad",
                default: "Experto en Ciberseguridad con más de 20 años de experiencia",
                children: {
                    ciso: {
                        label: "CISO — Chief Information Security Officer (20+ años)",
                        prompt: "Chief Information Security Officer (CISO) con más de 20 años de experiencia liderando estrategias de ciberseguridad a nivel empresarial. Dominas la gestión integral de riesgos, el cumplimiento normativo (ISO 27001, NIST CSF, SOC 2, GDPR, PCI-DSS) y la respuesta a incidentes de alto impacto. Tu enfoque es preventivo y holístico: evalúas las amenazas desde la perspectiva del atacante (threat modeling), defines políticas de seguridad robustas, gestionas el presupuesto de seguridad y comunicas el riesgo al board en términos de negocio. Aplicas siempre arquitectura Zero-Trust y el principio de mínimo privilegio."
                    },
                    pentester: {
                        label: "Ethical Hacker / Penetration Tester Senior (20+ años)",
                        prompt: "Experto en Pentesting y Seguridad Ofensiva con más de 20 años de experiencia en pruebas de penetración, red teaming y análisis de vulnerabilidades. Posees certificaciones OSCP, CRTO y CEH. Al analizar un sistema, piensas como un atacante real siguiendo las fases del Kill Chain: reconocimiento, escaneo, explotación, post-explotación y reporte. Identificas vulnerabilidades del OWASP Top 10, CVEs críticos y vectores de ataque lógicos. Cada hallazgo lo reportas con su score CVSS, la evidencia de explotación (PoC) y un plan de remediación priorizado y accionable."
                    },
                    soc_analyst: {
                        label: "Analista SOC Senior / Threat Hunter (20+ años)",
                        prompt: "Analista de Seguridad SOC Level 3 y Threat Hunter con más de 20 años de experiencia en detección, análisis y respuesta a incidentes de seguridad (DFIR). Dominas SIEM (Splunk, Microsoft Sentinel, Elastic), threat hunting proactivo y el framework MITRE ATT&CK. Al investigar un incidente, aplicas la metodología PICERL (Preparación, Identificación, Contención, Erradicación, Recuperación, Lecciones Aprendidas), generas IOCs (Indicators of Compromise) y construyes playbooks de respuesta automatizados (SOAR). Correlacionas eventos de múltiples fuentes para descubrir TTPs de atacantes sofisticados (APTs)."
                    },
                    appsec: {
                        label: "Ingeniero de Seguridad de Aplicaciones (AppSec) Senior",
                        prompt: "Ingeniero de Seguridad de Aplicaciones (AppSec) con más de 20 años de experiencia integrando seguridad en el ciclo de vida del desarrollo de software (DevSecOps). Dominas el análisis estático (SAST) y dinámico (DAST), la revisión de código seguro, el modelado de amenazas (STRIDE/PASTA) y la configuración de pipelines de seguridad en CI/CD (OWASP Dependency-Check, Snyk, SonarQube). Al revisar código o arquitecturas, identificas vulnerabilidades críticas (inyección SQL, XSS, SSRF, deserialization, broken auth) y propones mitigaciones concretas sin romper la funcionalidad del sistema."
                    },
                    cloud_security: {
                        label: "Ingeniero de Seguridad Cloud Senior (AWS/GCP/Azure)",
                        prompt: "Ingeniero de Seguridad Cloud con más de 20 años de experiencia protegiendo infraestructuras cloud en AWS, GCP y Azure. Posees las certificaciones AWS Security Specialty, CCSP y GCP Professional Cloud Security Engineer. Al auditar un entorno cloud, revisas la configuración IAM (least privilege, cross-account roles), el cifrado en reposo y en tránsito, la segmentación de red (VPCs, Security Groups, NACLs), el logging y monitoreo (CloudTrail, GuardDuty, Security Command Center) y el cumplimiento del CIS Benchmark. Identificas misconfiguraciones que conducen a exposición de datos o movimiento lateral."
                    }
                }
            },

            // ── DEVOPS Y CLOUD (NUEVO) ──────────────────────────────────────────
            devops: {
                label: "DevOps, Cloud e Infraestructura",
                default: "Ingeniero DevOps Senior con más de 20 años de experiencia",
                children: {
                    devops_senior: {
                        label: "Ingeniero DevOps Senior (20+ años)",
                        prompt: "Ingeniero DevOps Senior con más de 20 años de experiencia construyendo y optimizando pipelines de CI/CD, infraestructura como código (IaC) y plataformas cloud-native. Dominas Kubernetes, Docker, Terraform, Ansible, GitHub Actions y Jenkins. Tu filosofía es 'automatiza todo lo automatizable': desde el aprovisionamiento de infraestructura (GitOps con ArgoCD/Flux) hasta los rollbacks automáticos basados en métricas. Al diseñar soluciones, priorizas la observabilidad (métricas RED, logs estructurados en JSON, trazas distribuidas con OpenTelemetry), la resiliencia y la reducción del MTTR. Siempre propones métricas DORA para medir el éxito."

        };

        const INITIAL_SCHEMAS = [
            "JSON", "Markdown", "HTML", "CSV", "Código Fuente",
            "Tabla", "Lista de viñetas", "Texto Plano", "Mermaid Diagram", "SQL Query"
        ];

        // ─────────────────────────────────────────────────────────────────────────
        // ESTADO DE LA APLICACIÓN
        // ─────────────────────────────────────────────────────────────────────────
        let rolesData = JSON.parse(JSON.stringify(INITIAL_ROLES_DATA));
        let parentRole = '';
        let childRole = '';
        let techStack = [];
        let schemas = [...INITIAL_SCHEMAS];
       
        // --- Referencias DOM ---
        const els = {
            parentRole: document.getElementById('parentRole'),
            childRole: document.getElementById('childRole'),
            techStackContainer: document.getElementById('techStackContainer'),
            tagInput: document.getElementById('tagInput'),
            objective: document.getElementById('objective'),
            techContext: document.getElementById('techContext'),
            constraints: document.getElementById('constraints'),
            inputData: document.getElementById('inputData'),
            chainOfThought: document.getElementById('chainOfThought'),
            schemaSelect: document.getElementById('schemaSelect'),
            outputSchema: document.getElementById('outputSchema'),
            examples: document.getElementById('examples'),
            preview: document.getElementById('preview'),
            btnDelParent: document.getElementById('btnDelParent'),
            btnAddChild: document.getElementById('btnAddChild'),
            btnDelChild: document.getElementById('btnDelChild'),
            btnDelSchema: document.getElementById('btnDelSchema'),
            parentInputContainer: document.getElementById('parentInputContainer'),
            childInputContainer: document.getElementById('childInputContainer'),
            schemaInputContainer: document.getElementById('schemaInputContainer'),
            iconAddParent: document.getElementById('iconAddParent'),
            iconAddChild: document.getElementById('iconAddChild'),
            iconAddSchema: document.getElementById('iconAddSchema'),
            newParentLabel: document.getElementById('newParentLabel'),
            newChildLabel: document.getElementById('newChildLabel'),
            newSchemaLabel: document.getElementById('newSchemaLabel')
        };

        // ─────────────────────────────────────────────────────────────────────────
        // INICIALIZACIÓN
        // ─────────────────────────────────────────────────────────────────────────
        function init() {
            renderParentRoles();
            renderSchemas();
            attachListeners();
            updateXML();
            lucide.createIcons();
        }

        function attachListeners() {
            ['objective', 'techContext', 'constraints', 'inputData', 'chainOfThought', 'outputSchema', 'examples'].forEach(id => {
                els[id].addEventListener('input', updateXML);
            });
        }

        // ─────────────────────────────────────────────────────────────────────────
        // RENDERIZADO DE UI
        // ─────────────────────────────────────────────────────────────────────────
        function renderParentRoles() {
            const datalist = document.getElementById('parentRolesList');
            datalist.innerHTML = '';
            for (const [key, data] of Object.entries(rolesData)) {
                datalist.innerHTML += `<option value="${data.label}"></option>`;
            }
            if (parentRole && rolesData[parentRole]) {
                els.parentRole.value = rolesData[parentRole].label;
            }
            renderChildRoles();
        }

        function renderChildRoles() {
            els.childRole.innerHTML = parentRole
                ? '<option value="">Seleccionar...</option>'
                : '<option value="">Seleccionar rol primero</option>';
            els.childRole.disabled = !parentRole;
           
            if (parentRole && rolesData[parentRole]) {
                for (const [key, child] of Object.entries(rolesData[parentRole].children)) {
                    els.childRole.innerHTML += `<option value="${key}">${child.label}</option>`;
                }
                els.btnAddChild.disabled = false;
                els.btnAddChild.classList.remove('opacity-30');
                els.btnDelParent.classList.remove('hidden');
            } else {
                els.btnAddChild.disabled = true;
                els.btnAddChild.classList.add('opacity-30');
                els.btnDelParent.classList.add('hidden');
            }
            els.childRole.value = childRole;
            childRole ? els.btnDelChild.classList.remove('hidden') : els.btnDelChild.classList.add('hidden');
            updateXML();
        }

        function renderTechStack() {
            els.techStackContainer.innerHTML = '';
            techStack.forEach(tag => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 px-2.5 py-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs rounded-md group transition-all";
                div.innerHTML = `
                    <span>${tag}</span>
                    <button onclick="removeTag('${tag}')" class="text-emerald-500/50 hover:text-emerald-400 transition-colors">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                `;
                els.techStackContainer.appendChild(div);
            });
            lucide.createIcons();
            updateXML();
        }

        function renderSchemas() {
            els.schemaSelect.innerHTML = '<option value="">Seleccionar formato común...</option>';
            schemas.forEach(s => {
                els.schemaSelect.innerHTML += `<option value="${s}">${s}</option>`;
            });
            const currentSchema = els.outputSchema.value;
            if (schemas.includes(currentSchema)) {
                els.schemaSelect.value = currentSchema;
                els.btnDelSchema.classList.remove('hidden');
            } else {
                els.schemaSelect.value = '';
                els.btnDelSchema.classList.add('hidden');
            }
        }

        // ─────────────────────────────────────────────────────────────────────────
        // MANEJADORES DE EVENTOS
        // ─────────────────────────────────────────────────────────────────────────
        function handleParentChange() {
            const val = els.parentRole.value;
            parentRole = '';
            for (const [key, data] of Object.entries(rolesData)) {
                if (data.label === val) { parentRole = key; break; }
            }
            childRole = '';
            renderChildRoles();
            updateXML();
        }

        function handleChildChange() {
            childRole = els.childRole.value;
            childRole ? els.btnDelChild.classList.remove('hidden') : els.btnDelChild.classList.add('hidden');
            updateXML();
        }

        function handleSchemaChange() {
            const val = els.schemaSelect.value;
            els.outputSchema.value = val;
            val ? els.btnDelSchema.classList.remove('hidden') : els.btnDelSchema.classList.add('hidden');
            updateXML();
        }

        function handleAddTag(e) {
            if (e.key === 'Enter' && els.tagInput.value.trim()) {
                const tag = els.tagInput.value.trim();
                if (!techStack.includes(tag)) {
                    techStack.push(tag);
                    renderTechStack();
                }
                els.tagInput.value = '';
            }
        }

        function removeTag(tag) {
            techStack = techStack.filter(t => t !== tag);
            renderTechStack();
        }

        // ─────────────────────────────────────────────────────────────────────────
        // LÓGICA DE AGREGAR / ELIMINAR DINÁMICO
        // ─────────────────────────────────────────────────────────────────────────

        // Parent
        function toggleAddParent() {
            const isHidden = els.parentInputContainer.classList.contains('hidden');
            if (isHidden) {
                els.parentInputContainer.classList.remove('hidden');
                els.parentRole.classList.add('hidden');
                els.iconAddParent.setAttribute('data-lucide', 'x');
                els.newParentLabel.focus();
            } else {
                els.parentInputContainer.classList.add('hidden');
                els.parentRole.classList.remove('hidden');
                els.iconAddParent.setAttribute('data-lucide', 'plus');
            }
            lucide.createIcons();
        }

        function addParentCategory() {
            const val = els.newParentLabel.value.trim();
            if (!val) return;
            const id = val.toLowerCase().replace(/\s+/g, '_');
            rolesData[id] = { label: val, default: val, children: {} };
            parentRole = id;
            childRole = '';
            els.newParentLabel.value = '';
            toggleAddParent();
            renderParentRoles();
        }

        function deleteParentCategory() {
            if (!parentRole) return;
            delete rolesData[parentRole];
            parentRole = '';
            childRole = '';
            els.parentRole.value = '';
            renderParentRoles();
            updateXML();
        }

        // Child
        function toggleAddChild() {
            if (!parentRole) return;
            const isHidden = els.childInputContainer.classList.contains('hidden');
            if (isHidden) {
                els.childInputContainer.classList.remove('hidden');
                els.childRole.classList.add('hidden');
                els.iconAddChild.setAttribute('data-lucide', 'x');
                els.newChildLabel.focus();
            } else {
                els.childInputContainer.classList.add('hidden');
                els.childRole.classList.remove('hidden');
                els.iconAddChild.setAttribute('data-lucide', 'plus');
            }
            lucide.createIcons();
        }

        function addChildSpeciality() {
            const val = els.newChildLabel.value.trim();
            if (!val || !parentRole) return;
            const id = val.toLowerCase().replace(/\s+/g, '_');
            rolesData[parentRole].children[id] = { label: val, prompt: val };
            childRole = id;
            els.newChildLabel.value = '';
            toggleAddChild();
            renderChildRoles();
        }

        function deleteChildSpeciality() {
            if (!parentRole || !childRole) return;
            delete rolesData[parentRole].children[childRole];
            childRole = '';
            renderChildRoles();
        }

        // Schema
        function toggleAddSchema() {
            const isHidden = els.schemaInputContainer.classList.contains('hidden');
            if (isHidden) {
                els.schemaInputContainer.classList.remove('hidden');
                els.schemaSelect.classList.add('hidden');
                els.iconAddSchema.setAttribute('data-lucide', 'x');
                els.newSchemaLabel.focus();
            } else {
                els.schemaInputContainer.classList.add('hidden');
                els.schemaSelect.classList.remove('hidden');
                els.iconAddSchema.setAttribute('data-lucide', 'plus');
            }
            lucide.createIcons();
        }

        function addSchema() {
            const val = els.newSchemaLabel.value.trim();
            if (!val) return;
            if (!schemas.includes(val)) schemas.push(val);
            els.outputSchema.value = val;
            els.newSchemaLabel.value = '';
            toggleAddSchema();
            renderSchemas();
            updateXML();
        }

        function deleteSchema() {
            const val = els.outputSchema.value;
            schemas = schemas.filter(s => s !== val);
            els.outputSchema.value = '';
            renderSchemas();
            updateXML();
        }

        // ─────────────────────────────────────────────────────────────────────────
        // GENERACIÓN XML
        // ─────────────────────────────────────────────────────────────────────────
        function wrapTag(tag, content) {
            if (!content || content.trim() === '') return '';
            return `<${tag}>\n${content.trim()}\n</${tag}>\n\n`;
        }

        function formatList(list) {
            if (list.length === 0) return '';
            if (list.length === 1) return list[0];
            const items = [...list];
            const last = items.pop();
            return items.join(', ') + ' y ' + last;
        }

        function updateXML() {
            let xml = '<prompt_framework>\n\n';
            let roleContent = '';
            if (parentRole && rolesData[parentRole]) {
                const parent = rolesData[parentRole];
                const rolePrompt = childRole && parent.children[childRole]
                    ? parent.children[childRole].prompt
                    : parent.default;
                roleContent = `Asume el rol de ${rolePrompt}.`;
            } else if (els.parentRole.value && els.parentRole.value.trim() !== '') {
                roleContent = `Asume el rol de ${els.parentRole.value.trim()}.`;
            }
            xml += wrapTag('system_role', roleContent);
            xml += wrapTag('tech_stack', formatList(techStack));
            const obj = els.objective.value;
            if (obj) xml += `<task_definition>\n${obj.trim()}\n</task_definition>\n\n`;
            xml += wrapTag('technical_context', els.techContext.value);
            xml += wrapTag('input_data', els.inputData.value);
            xml += wrapTag('constraints', els.constraints.value);
            xml += wrapTag('chain_of_thought', els.chainOfThought.value);
            xml += wrapTag('output_schema', els.outputSchema.value);
            xml += wrapTag('examples', els.examples.value);
            xml += '</prompt_framework>';

            let rawXml = xml.replace(/\n{3,}/g, '\n\n').trim();
            let escapedXml = rawXml
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            let styledXml = escapedXml.replace(/(&lt;\/?[\w_]+&gt;)/g, '<span style="color: #f97316;">$1</span>');
            els.preview.innerHTML = styledXml;
        }

        // ─────────────────────────────────────────────────────────────────────────
        // COPIAR AL PORTAPAPELES
        // ─────────────────────────────────────────────────────────────────────────
        async function handleCopy() {
            const text = els.preview.innerText;
            try {
                await navigator.clipboard.writeText(text);
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i> COPIADO`;
                btn.classList.remove('bg-emerald-500', 'hover:bg-emerald-600', 'text-neutral-950');
                btn.classList.add('bg-blue-500', 'hover:bg-blue-600', 'text-white');
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = `<i data-lucide="copy" class="w-3.5 h-3.5"></i> COPIAR PROMPT`;
                    btn.classList.remove('bg-blue-500', 'hover:bg-blue-600', 'text-white');
                    btn.classList.add('bg-emerald-500', 'hover:bg-emerald-600', 'text-neutral-950');
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('Error al copiar:', err);
                alert('No se pudo copiar al portapapeles.');
            }
        }

        // ─────────────────────────────────────────────────────────────────────────
        // TAREA 1: LIMPIAR PROMPT — resetea todos los campos del formulario
        // Decisión técnica: reseteamos el estado JS y re-renderizamos en lugar de
        // manipular el DOM campo a campo, garantizando consistencia entre estado y vista.
        // ─────────────────────────────────────────────────────────────────────────
        function handleClear() {
            // Reset estado
            parentRole = '';
            childRole = '';
            techStack = [];

            // Reset inputs de rol
            els.parentRole.value = '';
            
            // Cerrar paneles de añadir si están abiertos
            ['parentInputContainer', 'childInputContainer', 'schemaInputContainer'].forEach(id => {
                const el = document.getElementById(id);
                if (el && !el.classList.contains('hidden')) {
                    el.classList.add('hidden');
                }
            });

            // Restaurar iconos a "plus"
            els.iconAddParent.setAttribute('data-lucide', 'plus');
            els.iconAddChild.setAttribute('data-lucide', 'plus');
            els.iconAddSchema.setAttribute('data-lucide', 'plus');

            // Mostrar los controles principales ocultos durante "add"
            els.parentRole.classList.remove('hidden');
            els.childRole.classList.remove('hidden');
            els.schemaSelect.classList.remove('hidden');

            // Limpiar inputs de nuevos ítems
            els.newParentLabel.value = '';
            els.newChildLabel.value = '';
            els.newSchemaLabel.value = '';

            // Reset textareas
            ['objective', 'techContext', 'constraints', 'inputData', 'chainOfThought', 'outputSchema', 'examples'].forEach(id => {
                els[id].value = '';
            });

            // Re-renderizar
            renderParentRoles();   // incluye renderChildRoles()
            renderTechStack();
            renderSchemas();
            updateXML();
            lucide.createIcons();

            // Feedback visual breve en el botón
            const btn = document.getElementById('clearBtn');
            btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i> LIMPIADO`;
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> LIMPIAR PROMPT`;
                lucide.createIcons();
            }, 1800);
        }

        // Iniciar la app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
